<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f0f23"/>
  <!-- Gamepad body -->
  <rect x="4" y="10" width="24" height="14" rx="5" fill="#1a1a2e" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Left D-pad vertical -->
  <rect x="9" y="13" width="2" height="6" rx="1" fill="#00ff88"/>
  <!-- Left D-pad horizontal -->
  <rect x="7" y="15" width="6" height="2" rx="1" fill="#00ff88"/>
  <!-- Right buttons -->
  <circle cx="22" cy="15" r="1.5" fill="#00ff88" opacity="0.5"/>
  <circle cx="25" cy="17" r="1.5" fill="#00ff88" opacity="0.8"/>
  <circle cx="22" cy="19" r="1.5" fill="#00ff88" opacity="0.5"/>
  <circle cx="19" cy="17" r="1.5" fill="#00ff88" opacity="0.8"/>
  <!-- Joystick bumps -->
  <circle cx="13" cy="22" r="2" fill="#252542" stroke="#00ff88" stroke-width="1"/>
  <circle cx="20" cy="22" r="2" fill="#252542" stroke="#00ff88" stroke-width="1"/>
</svg>
